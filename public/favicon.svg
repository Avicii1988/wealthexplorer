<svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 48 48" fill="none">
  <defs>
    <linearGradient id="goldTop" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f5e070"/>
      <stop offset="45%" stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6218"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0" y1="0" x2="48" y2="48" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff8d0" stop-opacity="0.7"/>
      <stop offset="50%" stop-color="#c9a84c" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#8a6218" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Crown base band -->
  <rect x="6" y="30" width="36" height="9" rx="2" fill="url(#goldTop)"/>
  <!-- Crown base highlight -->
  <rect x="6" y="30" width="36" height="3" rx="1.5" fill="url(#goldShine)" opacity="0.6"/>
  <!-- Crown points: left, center-left, center, center-right, right -->
  <polygon points="6,30 6,12 14,22 24,8 34,22 42,12 42,30" fill="url(#goldTop)"/>
  <!-- Inner shadow on crown body -->
  <polygon points="6,30 6,16 14,24 24,12 34,24 42,16 42,30" fill="url(#goldShine)" opacity="0.35"/>
  <!-- Center gem diamond -->
  <polygon points="24,8 27,14 24,20 21,14" fill="#fff8d0" opacity="0.95"/>
  <!-- Left gem -->
  <polygon points="6,12 8.5,16 6,20 3.5,16" fill="#f5e070" opacity="0.8"/>
  <!-- Right gem -->
  <polygon points="42,12 44.5,16 42,20 39.5,16" fill="#f5e070" opacity="0.8"/>
  <!-- Bottom strip detail -->
  <rect x="6" y="37" width="36" height="2" rx="1" fill="#8a6218" opacity="0.5"/>
</svg>
