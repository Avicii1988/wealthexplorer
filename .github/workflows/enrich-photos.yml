name: 📸 Enrich Real Celebrity Photos (every 5 min)

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Enrich real photos only
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SEARCHAPI_KEY: ${{ secrets.SEARCHAPI_KEY }}
        run: python scripts/enrich_real_photos.py

      - name: Commit & push if changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if [[ -n "$(git status --porcelain data/)" ]]; then
            git add data/
            git commit -m "chore: add real celebrity photos (auto every 5min)"
            git push
            echo "✅ New real photos committed"
          else
            echo "No new photos this run"
          fi
