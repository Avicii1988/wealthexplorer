name: 📸 Enrich Real Celebrity Photos (daily)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Enrich real photos only
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SEARCHAPI_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python scripts/enrich_real_photos.py

      - name: Commit & push if photos changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          CHANGED=$(git status --porcelain src/data/celebs_photos.json public/data/celebs.json 2>/dev/null)
          if [[ -n "$CHANGED" ]]; then
            git add src/data/celebs_photos.json public/data/celebs.json 2>/dev/null || true
            git commit -m "chore: update celebrity photos (auto daily)"
            git pull --rebase origin main
            git push origin HEAD:main
            echo "✅ Photos committed"
          else
            echo "ℹ️ No new photos this run"
          fi
