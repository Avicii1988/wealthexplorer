name: 🌟 Full Celebrity Enrichment (every 30 min)

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Run photo enrichment (avatars)
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          SEARCHAPI_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
        run: python scripts/full_enrichment_cron.py

      - name: Run profile enrichment (bios + asset images)
        env:
          SEARCHAPI_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCHAPI_API_KEY: ${{ secrets.SEARCH_API_KEY }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
        run: python scripts/enrich_celebs.py --limit 100

      - name: Validate output before committing
        run: |
          python3 -c "
          import json, sys
          try:
              data = json.load(open('public/data/celebs.json'))
          except Exception as e:
              print(f'❌ JSON parse error: {e}')
              sys.exit(1)
          if not isinstance(data, list) or len(data) < 500:
              print(f'❌ Safety check failed: only {len(data)} entries — refusing to commit')
              sys.exit(1)
          nulls = sum(1 for c in data if not c.get('name'))
          if nulls > 10:
              print(f'❌ Too many null names ({nulls}) — likely a corrupt run')
              sys.exit(1)
          print(f'✅ Validated: {len(data)} entries, {nulls} null names')
          "

      - name: Commit & push if public/data/celebs.json changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git

          if [[ -n "$(git status --porcelain public/data/celebs.json 2>/dev/null)" ]]; then
            git add public/data/celebs.json
            git commit -m "chore: enrich public/data/celebs.json (auto)"
            git pull --rebase origin main
            git push origin HEAD:main
            echo "✅ public/data/celebs.json updated"
          else
            echo "ℹ️  No changes to commit"
          fi
